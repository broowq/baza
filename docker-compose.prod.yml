services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: lead
      POSTGRES_USER: lead
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lead -d lead"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/var/lib/redis/data

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    init: true  # use tini to reap zombies inside container
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/search?q=test&format=json >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 7s
      retries: 3
      start_period: 30s
    environment:
      BASE_URL: http://searxng:8080/
      INSTANCE_NAME: BAZA SearXNG
    volumes:
      - ./infra/searxng/settings.yml:/etc/searxng/settings.yml:ro

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    labels:
      - "autoheal=true"  # opt into autoheal restarts on unhealthy
    environment:
      APP_ENV: production
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      REFRESH_TOKEN_EXPIRE_MINUTES: ${REFRESH_TOKEN_EXPIRE_MINUTES:-10080}
      DATABASE_URL: postgresql+psycopg2://lead:${POSTGRES_PASSWORD}@postgres:5432/lead
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      SEARXNG_URL: http://searxng:8080
      SEARXNG_TIMEOUT_SECONDS: "12"
      SEARXNG_RETRY_COUNT: "3"
      TWOGIS_API_KEY: ${TWOGIS_API_KEY:-}
      YANDEX_MAPS_API_KEY: ${YANDEX_MAPS_API_KEY:-}
      YANDEX_MAPS_LANG: ru_RU
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      GIGACHAT_CREDENTIALS: ${GIGACHAT_CREDENTIALS:-}
      GIGACHAT_SCOPE: ${GIGACHAT_SCOPE:-GIGACHAT_API_PERS}
      GIGACHAT_MODEL: ${GIGACHAT_MODEL:-GigaChat-2-Pro}
      LLM_PROVIDER: ${LLM_PROVIDER:-gigachat}
      FRONTEND_ORIGINS: ${CORS_ORIGINS:-http://usebaza.ru,https://usebaza.ru,http://www.usebaza.ru,https://www.usebaza.ru,http://${SERVER_IP}}
      FRONTEND_APP_URL: ${FRONTEND_APP_URL:-http://usebaza.ru}
      REFRESH_COOKIE_SECURE: ${REFRESH_COOKIE_SECURE:-false}
      REFRESH_COOKIE_SAMESITE: lax
      REFRESH_COOKIE_NAME: baza_refresh_token
      REFRESH_COOKIE_DOMAIN: ${REFRESH_COOKIE_DOMAIN:-}
      EMAIL_VERIFICATION_REQUIRED: ${EMAIL_VERIFICATION_REQUIRED:-false}
      EMAIL_VERIFICATION_EXPIRE_MINUTES: "1440"
      PASSWORD_RESET_EXPIRE_MINUTES: "30"
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      LOG_LEVEL: INFO
      LOG_FILE: logs/app.log
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://usebaza.ru/api}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    # No "autoheal=true" label → autoheal won't touch frontend (see autoheal
    # service config). Next.js recovers via docker's restart: unless-stopped
    # on actual crashes; autoheal was slamming it in false-positive loops.
    healthcheck:
      # Explicit 127.0.0.1, full GET to /, bypass `--spider` (busybox wget
      # implementation is inconsistent across alpine versions).
      test: ["CMD-SHELL", "wget -q -O /dev/null --timeout=8 http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    command: >
      celery -A app.celery_worker:celery worker
      --loglevel=info
      --max-tasks-per-child=100
      --prefetch-multiplier=1
      --concurrency=2
    environment:
      APP_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql+psycopg2://lead:${POSTGRES_PASSWORD}@postgres:5432/lead
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      SEARXNG_URL: http://searxng:8080
      SEARXNG_TIMEOUT_SECONDS: "12"
      SEARXNG_RETRY_COUNT: "3"
      TWOGIS_API_KEY: ${TWOGIS_API_KEY:-}
      YANDEX_MAPS_API_KEY: ${YANDEX_MAPS_API_KEY:-}
      YANDEX_MAPS_LANG: ru_RU
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      GIGACHAT_CREDENTIALS: ${GIGACHAT_CREDENTIALS:-}
      GIGACHAT_SCOPE: ${GIGACHAT_SCOPE:-GIGACHAT_API_PERS}
      GIGACHAT_MODEL: ${GIGACHAT_MODEL:-GigaChat-2-Pro}
      LLM_PROVIDER: ${LLM_PROVIDER:-gigachat}
      FRONTEND_APP_URL: http://${SERVER_IP}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./backend
    restart: unless-stopped
    command: >
      celery -A app.celery_worker:celery beat
      --loglevel=info
    environment:
      APP_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql+psycopg2://lead:${POSTGRES_PASSWORD}@postgres:5432/lead
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      LOG_LEVEL: INFO
    depends_on:
      redis:
        condition: service_healthy

  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    environment:
      # Opt-in via label: only restart containers with `autoheal=true`.
      # Backend opts in (see below); frontend doesn't — Next.js false-positives.
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_certs:
