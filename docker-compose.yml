# =============================================================================
# WARNING: Change all default credentials before deploying to production!
# Override via environment variables or a .env file.
# Example: POSTGRES_PASSWORD=<strong-random-password>
# =============================================================================

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      # WARNING: Change these default credentials in production!
      POSTGRES_DB: ${POSTGRES_DB:-lead}
      POSTGRES_USER: ${POSTGRES_USER:-lead}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lead}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lead} -d ${POSTGRES_DB:-lead}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    ports:
      - "58080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/search?q=test&format=json >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 7s
      retries: 5
    environment:
      BASE_URL: http://localhost:58080/
      INSTANCE_NAME: BAZA SearXNG
    volumes:
      - ./infra/searxng/settings.yml:/etc/searxng/settings.yml:ro

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-lead}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lead}
      POSTGRES_DB: ${POSTGRES_DB:-lead}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    command: >
      celery -A app.celery_worker:celery worker
      --loglevel=info
      --max-tasks-per-child=100
      --prefetch-multiplier=1
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-lead}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lead}
      POSTGRES_DB: ${POSTGRES_DB:-lead}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./backend
    restart: unless-stopped
    command: >
      celery -A app.celery_worker:celery beat
      --loglevel=info
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-lead}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lead}
      POSTGRES_DB: ${POSTGRES_DB:-lead}
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

volumes:
  postgres_data:
