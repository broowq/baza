use_default_settings: true

server:
  secret_key: "change-this-in-production"
  limiter: false
  image_proxy: false

search:
  formats:
    - html
    - json
  default_lang: "ru"

ui:
  static_use_hash: true

outgoing:
  request_timeout: 10.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: brave
    engine: brave
    shortcut: br
    disabled: false

  - name: startpage
    engine: startpage
    shortcut: sp
    disabled: false

  - name: qwant
    engine: qwant
    shortcut: qw
    disabled: false
    categories: general

  - name: mojeek
    engine: mojeek
    shortcut: mj
    disabled: false

  - name: yahoo
    engine: yahoo
    shortcut: yh
    disabled: false

  - name: bing
    engine: bing
    shortcut: bi
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

  - name: wikidata
    engine: wikidata
    shortcut: wd
    disabled: true
